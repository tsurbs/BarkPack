version: '3.8'

services:
  postgres:
    # We use ankane/pgvector which is the official docker image for pgvector
    image: ankane/pgvector:latest
    container_name: barkbot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barkbot
    ports:
      - "5432:5432"
    volumes:
      - barkbot_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: barkbot_rustfs
    ports:
      - "9000:9000"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    volumes:
      - barkbot_rustfsdata:/data
    command: ["--access-key", "rustfsadmin", "--secret-key", "rustfsadmin", "/data"]
    restart: unless-stopped

volumes:
  barkbot_pgdata:
  barkbot_rustfsdata:
