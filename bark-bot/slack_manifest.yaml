display_information:
  name: Bark
  description: Multi-modal agentic AI orchestrator.
  background_color: "#1c1c1e"
features:
  bot_user:
    display_name: Bark
    always_online: true
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - chat:write
      - reactions:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
settings:
  event_subscriptions:
    request_url: https://bark-bot-production.up.railway.app/slack/events
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://bark-bot-production.up.railway.app/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
