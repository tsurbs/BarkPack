services:
  bark:
    build: .
    container_name: bark
    ports:
      - "8000:8000"
    volumes:
      - bark_volume:/bark-volume
    env_file:
      - .env
    environment:
      - BARK_VOLUME_PATH=/bark-volume
      - CHROMA_HOST=chromadb
    depends_on:
      chromadb:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:latest
    container_name: bark-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=True
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
  bark_volume:
